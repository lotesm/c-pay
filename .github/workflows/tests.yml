name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.1", "8.2", "8.3"]
        laravel: ["10.*", "11.*"]
        exclude:
          - php: "8.1"
            laravel: "11.*"

    name: PHP ${{ matrix.php }} · Laravel ${{ matrix.laravel }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, json, curl
          coverage: xdebug

      - name: Cache Composer packages
        uses: actions/cache@v3
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ matrix.php }}-laravel-${{ matrix.laravel }}-${{ hashFiles('composer.json') }}

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:$(php -r "echo version_compare('${{ matrix.laravel }}', '11', '>=') ? '^9.0' : '^8.0';")" \
            --no-interaction --no-update
          composer update --prefer-dist --no-interaction

      - name: Run Unit tests
        run: vendor/bin/phpunit --testsuite Unit --coverage-text

      - name: Run Feature tests
        run: vendor/bin/phpunit --testsuite Feature
